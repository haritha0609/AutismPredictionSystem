<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Wellness Questionnaire</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f8fb;
        }

        .card{
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,.1);
        }

        h2{
            font-weight:bold;
        }

        .btn-primary{
            width:100%;
            padding:12px;
            font-size:18px;
        }
    </style>

</head>
<body>

<div class="container mt-5 mb-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card p-4">

<h2 class="text-center text-primary mb-4">
🤖 AI Wellness Questionnaire
</h2>

<p class="text-center text-muted">
Answer a few more questions to receive a personalized wellness plan.
</p>

<form action="/generate-wellness" method="POST">

<div class="mb-3">
<label class="form-label">Food Allergy</label>
<input type="text" class="form-control" name="food_allergy" placeholder="Example: Peanuts / None">
</div>

<div class="mb-3">
<label class="form-label">Diet Preference</label>

<select class="form-select" name="diet_preference">
<option>Vegetarian</option>
<option>Non Vegetarian</option>
<option>Vegan</option>
<option>Mixed</option>
</select>

</div>

<div class="mb-3">
<label class="form-label">Average Sleep Hours</label>

<input type="number"
class="form-control"
name="sleep_hours"
placeholder="Example: 8">

</div>

<div class="mb-3">
<label class="form-label">Outdoor Play Time (minutes/day)</label>

<input type="number"
class="form-control"
name="outdoor_play"
placeholder="Example: 60">

</div>

<div class="mb-3">
<label class="form-label">Any Sensory Issues?</label>

<textarea
class="form-control"
name="sensory_issues"
rows="3"
placeholder="Example: Sensitive to loud sounds"></textarea>

</div>

<div class="mb-3">
<label class="form-label">Favourite Activities</label>

<textarea
class="form-control"
name="favorite_activity"
rows="3"
placeholder="Drawing, Music, Puzzle, Toys..."></textarea>

</div>

<div class="mb-4">
<label class="form-label">Parent's Main Concern</label>

<textarea
class="form-control"
name="parent_concern"
rows="4"
placeholder="Describe your concern..."></textarea>

</div>

<button class="btn btn-primary">
Generate AI Wellness Plan
</button>

</form>

</div>

</div>

</div>

</div>

</body>
</html>
